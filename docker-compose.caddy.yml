services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    environment:
      SERVER_ADDRESS: ${SERVER_ADDRESS:-}
    entrypoint: /bin/sh -c "caddy run --config /my_config/Caddyfile --adapter caddyfile"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy_root:/usr/share/caddy
      - ./caddy_certs:/data/caddy/pki/authorities/local
      - ./caddy/Caddyfile:/my_config/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: