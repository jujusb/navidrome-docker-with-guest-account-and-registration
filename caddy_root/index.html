<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navidrome Access Portal</title>
  <style>
    :root {
      --bg-a: #f4f7f1;
      --bg-b: #e6efe0;
      --panel: #ffffff;
      --ink: #1f2a1f;
      --muted: #5d6a5d;
      --line: #d8e2d3;
      --brand: #2f7a4b;
      --brand-strong: #215d38;
      --accent: #d06a2f;
      --error: #b64545;
      --ok: #2f7a4b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 38%),
        radial-gradient(circle at 90% 0%, #dcebd5 0%, transparent 35%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(33, 64, 36, 0.14);
      overflow: hidden;
    }

    .head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #f9fcf7, #f2f8ee);
    }

    .head h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: 0.2px;
    }

    .head p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .sub {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .row {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid #cfdac9;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    input:focus {
      outline: 2px solid #9fcaad;
      border-color: #8ebf9f;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    button, .link-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover { background: var(--brand-strong); }

    .secondary {
      background: #eef4ea;
      color: #2d3b2f;
      border: 1px solid #d2ddcc;
    }

    .guest {
      background: var(--accent);
      color: #fff;
    }

    .guest:hover { background: #b85c29; }

    #status {
      margin: 0 18px 18px;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      display: none;
      font-size: 0.94rem;
    }

    #status.ok {
      display: block;
      background: #ecf7ef;
      color: var(--ok);
      border-color: #bfdcc5;
    }

    #status.error {
      display: block;
      background: #faeeee;
      color: var(--error);
      border-color: #ebc6c6;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <h1>Navidrome Access Portal</h1>
      <p>Use guest mode, sign in with your account, or create a new user.</p>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>Login</h2>
        <p class="sub">All login options from one page.</p>

        <div class="actions" style="margin-bottom: 12px;">
          <button id="guestBtn" class="guest" type="button">Use Guest Account</button>
          <a class="link-btn secondary" href="/app/">Go To Navidrome Login Page</a>
        </div>

        <form id="loginForm">
          <div class="row">
            <label for="loginUsername">Username</label>
            <input id="loginUsername" name="username" autocomplete="username" required />
          </div>
          <div class="row">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </div>
          <div class="actions">
            <button class="primary" type="submit">Login With Credentials</button>
          </div>
        </form>
      </article>

      <article class="panel">
        <h2>Register</h2>
        <p class="sub">Create a new account and optionally log in right away.</p>

        <form id="registerForm">
          <div class="row">
            <label for="regUsername">New Username</label>
            <input id="regUsername" name="username" autocomplete="username" required />
          </div>
          <div class="row">
            <label for="regPassword">New Password</label>
            <input id="regPassword" name="password" type="password" autocomplete="new-password" required />
          </div>
          <div class="row">
            <label for="regPassword2">Confirm Password</label>
            <input id="regPassword2" name="password2" type="password" autocomplete="new-password" required />
          </div>
          <div class="actions">
            <button class="primary" type="submit">Create Account</button>
            <button id="registerAndLoginBtn" class="secondary" type="button">Create + Login</button>
          </div>
        </form>
      </article>
    </section>

    <div id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    const statusEl = document.getElementById('status');

    function setStatus(type, message) {
      statusEl.className = type;
      statusEl.textContent = message;
    }

    function persistNavidromeAuth(auth) {
      const userId = auth.id || auth.uid || '';
      const role = auth.isAdmin ? 'admin' : 'regular';

      localStorage.setItem('token', auth.token || '');
      localStorage.setItem('userId', String(userId));
      localStorage.setItem('name', auth.name || auth.username || '');
      localStorage.setItem('username', auth.username || '');
      localStorage.setItem('role', role);
      localStorage.setItem('subsonic-salt', auth.subsonicSalt || '');
      localStorage.setItem('subsonic-token', auth.subsonicToken || '');
      localStorage.setItem('is-authenticated', 'true');

      if (auth.avatar) {
        localStorage.setItem('avatar', auth.avatar);
      }
    }

    async function login(username, password) {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      let payload = null;
      try { payload = await res.json(); } catch (_) {}

      if (!res.ok || !payload || !payload.token) {
        const msg = (payload && payload.error) || 'Login failed';
        throw new Error(msg);
      }

      persistNavidromeAuth(payload);
      window.location.href = '/app/'; // Redirect to Navidrome app
    }

    async function register(username, password) {
      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      let data = null;
      try { data = await res.json(); } catch (_) {}

      if (!res.ok || !data || !data.success) {
        throw new Error((data && data.error) || 'Registration failed');
      }

      return data;
    }

    document.getElementById('guestBtn').addEventListener('click', async () => {
      setStatus('ok', 'Logging in as guest...');
      try {
        let res = await fetch('/guest', {
          method: 'GET'
        });

        let data = null;
        try { data = await res.json(); } catch (_) {}

        if (!res.ok || !data || !data.success) {
          throw new Error((data && data.error) || 'Guest login failed');
        }
        await login(data.username, data.password);
      } catch (err) {
        setStatus('error', 'Guest login failed. Use manual login below.');
        console.error(err);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      setStatus('ok', 'Signing in...');
      try {
        await login(username, password);
      } catch (err) {
        setStatus('error', 'Login failed. Check username/password.');
        console.error(err);
      }
    });

    async function handleRegister(alsoLogin) {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;

      if (password !== password2) {
        setStatus('error', 'Passwords do not match.');
        return;
      }

      setStatus('ok', 'Creating account...');
      try {
        await register(username, password);
        if (alsoLogin) {
          setStatus('ok', 'Account created. Logging in...');
          await login(username, password);
          return;
        }
        setStatus('ok', 'Account created. You can now sign in.');
      } catch (err) {
        setStatus('error', err.message || 'Registration failed.');
        console.error(err);
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleRegister(false);
    });

    document.getElementById('registerAndLoginBtn').addEventListener('click', async () => {
      await handleRegister(true);
    });
  </script>
</body>
</html>
